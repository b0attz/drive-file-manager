services:
  - type: web
    name: google-drive-file-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: openssl rand -hex 32
      - key: APP_URL
        sync: false  # ตั้งเป็น https://your-app-name.onrender.com หรือ custom domain
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
